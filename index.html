<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tebak Bangun Datar</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎮 Tebak Bangun Datar</h1>

<img id="shapeImg" width="200">

<p id="fact"></p>

<div id="answers"></div>

<p>⏱️ Waktu: <span id="timer"></span></p>
<p>⭐ Skor: <span id="score"></span></p>
<p>❤️ Nyawa: <span id="lives"></span></p>

<div style="width:100%;background:#ddd;height:10px;">
  <div id="progressBar" style="height:10px;background:green;width:0%;"></div>
</div>

<!-- AUDIO -->
<audio id="correct" src="AUDIO/correct.mp3"></audio>
<audio id="wrong" src="AUDIO/wrong.mp3"></audio>

<!-- POPUP -->
<div id="popup" class="popup">
  <h2>Game Selesai</h2>
  <p id="finalScore"></p>
  <p>🏆 High Score: <span id="bestScore"></span></p>
  <p>✅ Benar: <span id="correctCount"></span></p>
  <p>❌ Salah: <span id="wrongCount"></span></p>

  <button onclick="restart()">Main Lagi</button>
</div>

<script src="script.js" defer></script>

</body>
</html>
